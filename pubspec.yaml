name: bigbrother
description: 'A dystopian surveillance simulator. Submission for the 5th official Flame Game Jam.'
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.8.0

dependencies:
  equatable: ^2.0.8
  flame: ^1.36.0
  flame_audio: ^2.11.14
  # flame_bloc: ^1.12.21
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    
